version: '3'

vars:
  VERSION: 1.1.0
  RELEASE_IMAGE: dacjames/target
  IMAGE: target:latest
  E2E_IMAGE: target:e2e
  E2E_CONTAINER: target-e2e
  # host:container port publish list, shared by run + e2e.
  PORTS: >-
    -p 8081:8081 -p 8082:8082 -p 8443:8443
    -p 9090:9090 -p 9091:9091 -p 8053:8053/udp

tasks:
  go:build:
    desc: Compile all packages
    cmds:
      - go build ./...

  go:vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  go:tests:
    desc: Run tests
    cmds:
      - go test ./...

  go:fmt:
    desc: Format sources
    cmds:
      - gofmt -l -w .

  go:tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  go:run:
    desc: Run the service (honors TARGET_CONFIG / TARGET_LOG)
    cmds:
      - go run .

  check:
    desc: Dev loop — build, vet, format-check, test
    cmds:
      - go build ./...
      - go vet ./...
      - gofmt -l .
      - go test ./...

  smoke:
    desc: Boot the service locally and exercise every path (HTTP/HTTPS/TCP/UDP)
    cmds:
      - bash scripts/smoke.sh

  ping:check:
    desc: Verify the ICMP callback across every TARGET_PINGER impl (socket/system/auto)
    cmds:
      - bash scripts/ping-check.sh

  docker:build:
    desc: Build the container image
    cmds:
      - docker build -t {{.IMAGE}} .

  docker:run:
    desc: Run the container in the foreground (Ctrl-C to stop)
    deps: [docker:build]
    cmds:
      - docker run --rm -it {{.PORTS}} --name target -e TARGET_LOG=debug {{.IMAGE}}

  docker:stop:
    desc: Stop a detached container started by docker:run
    cmds:
      - docker rm -f target 2>/dev/null || true

  e2e:
    desc: Build image, run container (auth on), execute the e2e suite against it, tear down
    cmds:
      - defer: docker rm -f {{.E2E_CONTAINER}} 2>/dev/null || true
      - docker build -t {{.E2E_IMAGE}} .
      - docker rm -f {{.E2E_CONTAINER}} 2>/dev/null || true
      # Auth on so /callback is exercised end-to-end; grab the logged token.
      - docker run -d --name {{.E2E_CONTAINER}} {{.PORTS}} -e TARGET_AUTH=true {{.E2E_IMAGE}}
      - |
        for _ in $(seq 1 50); do curl -sf -o /dev/null http://localhost:8081/healthz && break || sleep 0.2; done
        TOKEN=$(docker logs {{.E2E_CONTAINER}} 2>&1 | grep 'auth token' | tail -1 | sed 's/.*: //')
        echo "e2e auth token: ${TOKEN:0:24}..."
        TARGET_E2E_TOKEN="$TOKEN" go test -tags e2e -v -count=1 ./e2e/...

  e2e:remote:
    desc: 'Run the e2e suite against a deployed backend (set TARGET_E2E_* env vars)'
    cmds:
      - go test -tags e2e -v -count=1 ./e2e/...

  release:binaries:
    desc: Cross-compile release binaries + checksums into dist/ (VERSION={{.VERSION}})
    cmds:
      - bash scripts/release.sh {{.VERSION}}

  release:docker:
    desc: Build + push multi-arch image {{.RELEASE_IMAGE}}:{{.VERSION}} and :latest (needs docker login)
    cmds:
      # Multi-platform needs a docker-container builder (the default docker
      # driver can't). Create it once, reuse thereafter.
      - docker buildx inspect target-builder >/dev/null 2>&1 || docker buildx create --name target-builder --driver docker-container
      - >-
        docker buildx build --builder target-builder
        --platform linux/amd64,linux/arm64
        --build-arg VERSION={{.VERSION}}
        -t {{.RELEASE_IMAGE}}:{{.VERSION}} -t {{.RELEASE_IMAGE}}:latest
        --push .

  release:github:
    desc: Create GitHub release v{{.VERSION}} with the dist/ binaries
    deps: [release:binaries]
    cmds:
      - >-
        gh release create v{{.VERSION}} dist/target_* dist/SHA256SUMS
        --title "v{{.VERSION}}" --generate-notes

  release:
    desc: Full release — binaries + GitHub release + multi-arch image push
    cmds:
      - task: release:github
      - task: release:docker

  build:
    desc: Alias for go:build
    cmds:
      - task: go:build

  vet:
    desc: Alias for go:vet
    cmds:
      - task: go:vet

  tests:
    desc: Alias for go:tests
    cmds:
      - task: go:tests
